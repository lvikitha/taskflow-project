# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (PostgreSQL)
# Uses environment variable DATABASE_URL if set, otherwise falls back to localhost for local dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:tiger}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings - wait for DB to be ready
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:taskflow-super-secret-key-2024-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# AI Configuration (Google Gemini)
ai.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
ai.gemini.model=gemini-3.5-flash

# Logging
logging.level.com.taskflow=INFO
logging.level.org.springframework.security=WARN

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method